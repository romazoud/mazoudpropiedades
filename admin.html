<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración | Mazoud Propiedades</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --negro:#0D0D0D; --rojo:#C1121F; --rojo-hover:#a50e1a; --gris:#2B2B2B;
    --blanco:#FFFFFF; --texto-muted:rgba(255,255,255,0.55); --border:rgba(255,255,255,0.1);
  }
  body { font-family:'Montserrat',sans-serif; background:var(--negro); color:var(--blanco); min-height:100vh; }
  input, select, textarea, button { font-family:'Montserrat',sans-serif; }

  /* ---- LOGIN ---- */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-box {
    background:var(--gris); border:1px solid var(--border); border-radius:6px;
    padding:44px 36px; width:100%; max-width:380px;
  }
  .login-box h1 {
    font-size:15px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
    margin-bottom:6px; text-align:center;
  }
  .login-box .sub { font-size:12px; color:var(--texto-muted); text-align:center; margin-bottom:28px; }
  .fg { margin-bottom:16px; }
  .fg label { display:block; font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:8px; }
  .fg input, .fg select, .fg textarea {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    border-radius:3px; padding:12px 14px; color:#fff; font-size:13px; outline:none;
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--rojo); }
  .btn-red {
    width:100%; background:var(--rojo); color:#fff; border:none; border-radius:3px;
    font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
    padding:14px; cursor:pointer; transition:background .2s;
  }
  .btn-red:hover { background:var(--rojo-hover); }
  .btn-outline {
    width:100%; background:transparent; color:rgba(255,255,255,0.6); border:1px solid var(--border);
    border-radius:3px; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    padding:12px; cursor:pointer; margin-top:10px;
  }
  #login-error { color:var(--rojo); font-size:12px; margin-top:12px; text-align:center; min-height:16px; }

  /* ---- PANEL ---- */
  #panel { display:none; }
  header.admin-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 5%; border-bottom:1px solid var(--border); position:sticky; top:0;
    background:rgba(13,13,13,0.97); backdrop-filter:blur(8px); z-index:10;
  }
  header.admin-header h2 { font-size:14px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }
  header.admin-header span { color:var(--texto-muted); font-size:12px; }
  #logout-btn {
    background:transparent; border:1px solid var(--border); color:#fff; padding:8px 16px;
    border-radius:3px; font-size:11px; letter-spacing:1px; text-transform:uppercase;
  }
  #logout-btn:hover { border-color:var(--rojo); color:var(--rojo); }

  main { max-width:1100px; margin:0 auto; padding:40px 5% 100px; display:grid; grid-template-columns:1fr; gap:40px; }
  @media (min-width:900px) { main { grid-template-columns: 420px 1fr; } }

  .panel-card { background:var(--gris); border:1px solid var(--border); border-radius:6px; padding:30px; }
  .panel-card h3 { font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-bottom:22px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .fg textarea { resize:vertical; min-height:80px; }
  .fg select option { background:#1a1a1a; }
  .check-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .check-row input { width:auto; }
  .check-row label { margin:0; font-size:12px; color:var(--texto-muted); text-transform:none; letter-spacing:0; font-weight:500; }

  #form-msg { font-size:12px; margin-top:14px; text-align:center; min-height:16px; }
  #form-msg.ok { color:#5bd17a; }
  #form-msg.err { color:var(--rojo); }

  /* ---- SECCIÓN FOTOS ---- */
  .seccion-fotos { border: 1px dashed rgba(255,255,255,0.2); padding: 20px; border-radius: 4px; margin-bottom: 20px; background: rgba(0,0,0,0.2); }
  .seccion-fotos h4 { font-size: 11px; color: var(--rojo); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

  /* ---- LISTADO ---- */
  .prop-item {
    display:flex; gap:16px; background:rgba(255,255,255,0.03); border:1px solid var(--border);
    border-radius:6px; padding:14px; margin-bottom:14px; align-items:center;
  }
  .prop-item img {
    width:90px; height:70px; object-fit:cover; border-radius:4px; background:#111; flex-shrink:0;
  }
  .prop-item .info { flex:1; min-width:0; }
  .prop-item .info h4 { font-size:13px; font-weight:700; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prop-item .info p { font-size:12px; color:var(--texto-muted); }
  .prop-item .tag {
    display:inline-block; background:rgba(193,18,31,0.15); color:var(--rojo);
    font-size:9px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; border-radius:3px; margin-top:6px;
  }
  .prop-item .acciones { display:flex; flex-direction:column; gap:8px; }
  .btn-icon {
    background:transparent; border:1px solid var(--border); color:#fff; width:34px; height:34px;
    border-radius:4px; font-size:13px; cursor:pointer;
  }
  .btn-icon:hover { border-color:var(--rojo); color:var(--rojo); }
  #lista-vacia { color:var(--texto-muted); font-size:13px; text-align:center; padding:30px 0; }
</style>
</head>
<body>

<!-- ============ PANTALLA DE LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>Mazoud Propiedades</h1>
    <p class="sub">Panel privado de carga de propiedades</p>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@mail.com" autocomplete="username">
    </div>
    <div class="fg">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-red" onclick="iniciarSesion()">Ingresar</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- ============ PANEL (visible solo logueado) ============ -->
<div id="panel">
  <header class="admin-header">
    <h2>Panel de Propiedades</h2>
    <div style="display:flex; align-items:center; gap:16px;">
      <span id="user-email"></span>
      <button id="logout-btn" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <main>
    <!-- FORMULARIO -->
    <div class="panel-card">
      <h3 id="form-title">Cargar nueva propiedad</h3>
      <input type="hidden" id="edit-id" value="">

      <div class="fg">
        <label>Tipo de propiedad</label>
        <select id="f-tipo">
          <option value="Departamento">Departamento</option>
          <option value="Casa / PH">Casa / PH</option>
          <option value="Local">Local</option>
        </select>
      </div>

      <div class="grid2">
        <div class="fg">
          <label>Operación</label>
          <select id="f-operacion">
            <option value="Venta">Venta</option>
            <option value="Alquiler">Alquiler</option>
          </select>
        </div>
        <div class="fg">
          <label>Moneda</label>
          <select id="f-moneda">
            <option value="USD">USD</option>
            <option value="ARS">ARS</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label>Título</label>
        <input type="text" id="f-titulo" placeholder="Ej: Depto 2 amb. a estrenar en Palermo">
      </div>

      <div class="grid2">
        <div class="fg">
          <label>Precio</label>
          <input type="number" id="f-precio" placeholder="Ej: 85000">
        </div>
        <div class="fg">
          <label>Zona / Barrio</label>
          <input type="text" id="f-zona" placeholder="Ej: Palermo">
        </div>
      </div>

      <div class="fg">
        <label>Dirección (opcional)</label>
        <input type="text" id="f-direccion" placeholder="Ej: Av. Santa Fe 1234">
      </div>

      <div class="grid2">
        <div class="fg">
          <label>Ambientes</label>
          <input type="number" id="f-ambientes" placeholder="Ej: 3">
        </div>
        <div class="fg">
          <label>Dormitorios</label>
          <input type="number" id="f-dormitorios" placeholder="Ej: 2">
        </div>
      </div>

      <div class="grid2">
        <div class="fg">
          <label>Baños</label>
          <input type="number" id="f-banos" placeholder="Ej: 1">
        </div>
        <div class="fg">
          <label>m² cubiertos</label>
          <input type="number" id="f-m2cub" placeholder="Ej: 65">
        </div>
      </div>

      <div class="grid2">
        <div class="fg">
          <label>m² totales</label>
          <input type="number" id="f-m2tot" placeholder="Ej: 70">
        </div>
        <div class="fg">
          <label>Antigüedad (años)</label>
          <input type="number" id="f-antiguedad" placeholder="Ej: 5">
        </div>
      </div>

      <div class="check-row">
        <input type="checkbox" id="f-cochera">
        <label for="f-cochera">Tiene cochera</label>
      </div>

      <div class="fg">
        <label>Descripción</label>
        <textarea id="f-descripcion" placeholder="Detalles, amenities, estado general, etc."></textarea>
      </div>

      <!-- NUEVO SISTEMA DE FOTOS SEPARADAS -->
      <div class="seccion-fotos">
        <h4>Diseño Arquitectónico (Elegí dónde va cada foto)</h4>
        
        <div class="fg">
          <label>1. FOTO PRINCIPAL (Aparece gigante arriba de todo)</label>
          <input type="file" id="f-foto-0" accept="image/*">
        </div>
        
        <div class="fg">
          <label>2. PLANO O FOTO DERECHA (Al lado del texto)</label>
          <input type="file" id="f-foto-1" accept="image/*">
        </div>
        
        <div class="grid2">
          <div class="fg">
            <label>3. FOTO ABAJO 1</label>
            <input type="file" id="f-foto-2" accept="image/*">
          </div>
          <div class="fg">
            <label>4. FOTO ABAJO 2</label>
            <input type="file" id="f-foto-3" accept="image/*">
          </div>
          <div class="fg">
            <label>5. FOTO ABAJO 3</label>
            <input type="file" id="f-foto-4" accept="image/*">
          </div>
        </div>
      </div>

      <button class="btn-red" id="btn-guardar" onclick="guardarPropiedad()">Publicar propiedad</button>
      <button class="btn-outline" id="btn-cancelar-edicion" onclick="cancelarEdicion()" style="display:none;">Cancelar edición</button>
      <p id="form-msg"></p>
    </div>

    <!-- LISTADO -->
    <div class="panel-card">
      <h3>Propiedades cargadas (<span id="contador">0</span>)</h3>
      <div id="lista-propiedades"></div>
      <p id="lista-vacia" style="display:none;">Todavía no cargaste ninguna propiedad.</p>
    </div>
  </main>
</div>

<script>
/* ============================================================
   AUTENTICACIÓN
   ============================================================ */
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    cargarPropiedades();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('panel').style.display = 'none';
  }
});

function iniciarSesion() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errBox = document.getElementById('login-error');
  errBox.textContent = '';

  if (!email || !pass) {
    errBox.textContent = 'Completá email y contraseña.';
    return;
  }

  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => {
      errBox.textContent = 'Email o contraseña incorrectos.';
      console.error(err);
    });
}

function cerrarSesion() {
  auth.signOut();
}

/* ============================================================
   GUARDAR / EDITAR PROPIEDAD
   ============================================================ */
function limpiarFormulario() {
  ['f-titulo','f-precio','f-zona','f-direccion','f-ambientes','f-dormitorios',
   'f-banos','f-m2cub','f-m2tot','f-antiguedad','f-descripcion',
   'f-foto-0','f-foto-1','f-foto-2','f-foto-3','f-foto-4'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('f-cochera').checked = false;
  document.getElementById('edit-id').value = '';
  document.getElementById('form-title').textContent = 'Cargar nueva propiedad';
  document.getElementById('btn-guardar').textContent = 'Publicar propiedad';
  document.getElementById('btn-cancelar-edicion').style.display = 'none';
}

function cancelarEdicion() {
  limpiarFormulario();
}

async function guardarPropiedad() {
  const msg = document.getElementById('form-msg');
  msg.className = ''; msg.textContent = '';

  const titulo = document.getElementById('f-titulo').value.trim();
  const precio = document.getElementById('f-precio').value;
  const zona = document.getElementById('f-zona').value.trim();

  if (!titulo || !precio || !zona) {
    msg.className = 'err';
    msg.textContent = 'Completá al menos título, precio y zona.';
    return;
  }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.textContent = 'Subiendo fotos y guardando...';

  const editId = document.getElementById('edit-id').value;

  const datos = {
    tipo: document.getElementById('f-tipo').value,
    operacion: document.getElementById('f-operacion').value,
    moneda: document.getElementById('f-moneda').value,
    titulo,
    precio: Number(precio),
    zona,
    direccion: document.getElementById('f-direccion').value.trim(),
    ambientes: Number(document.getElementById('f-ambientes').value) || null,
    dormitorios: Number(document.getElementById('f-dormitorios').value) || null,
    banos: Number(document.getElementById('f-banos').value) || null,
    m2Cubiertos: Number(document.getElementById('f-m2cub').value) || null,
    m2Totales: Number(document.getElementById('f-m2tot').value) || null,
    antiguedad: Number(document.getElementById('f-antiguedad').value) || null,
    cochera: document.getElementById('f-cochera').checked,
    descripcion: document.getElementById('f-descripcion').value.trim(),
    actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(),
    cargadoPor: auth.currentUser.email
  };

  try {
    let docId = editId;
    let fotosExistentes = ["", "", "", "", ""];

    // Si estamos editando, traemos las fotos viejas por si dejó un casillero vacío
    if (docId) {
      const docSnap = await db.collection('propiedades').doc(docId).get();
      const datosViejos = docSnap.data();
      if (datosViejos.fotos) {
        for(let i=0; i<5; i++) {
          fotosExistentes[i] = datosViejos.fotos[i] || "";
        }
      }
    }

    // Función para subir a Cloudinary
    const cloudName = 'dxk39alqz'; 
    const uploadPreset = 'mazoud-propiedades'; 
    const cloudinaryUrl = `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`;

    async function subirUnicaFoto(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', uploadPreset);
      const response = await fetch(cloudinaryUrl, { method: 'POST', body: formData });
      const data = await response.json();
      return data.secure_url;
    }

    // Revisamos cada una de las 5 cajitas
    for (let i = 0; i < 5; i++) {
      const fileInput = document.getElementById(`f-foto-${i}`);
      if (fileInput && fileInput.files.length > 0) {
        // Si subió foto nueva, la pisamos en ese lugar exacto
        fotosExistentes[i] = await subirUnicaFoto(fileInput.files[0]);
      }
    }

    // Fallbacks (Por si deja la 1 o la 2 vacías al publicar por primera vez)
    if (!fotosExistentes[0]) fotosExistentes[0] = "https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1200";
    if (!fotosExistentes[1]) fotosExistentes[1] = "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200";

    datos.fotos = fotosExistentes;

    // Guardamos en Firebase
    if (!docId) {
      datos.creadoEn = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('propiedades').add(datos);
    } else {
      await db.collection('propiedades').doc(docId).update(datos);
    }

    msg.className = 'ok';
    msg.textContent = editId ? 'Propiedad actualizada correctamente.' : 'Propiedad publicada correctamente.';
    limpiarFormulario();
    cargarPropiedades();

  } catch (err) {
    console.error(err);
    msg.className = 'err';
    msg.textContent = 'Ocurrió un error al guardar. Revisá la consola.';
  } finally {
    btn.disabled = false;
    btn.textContent = editId ? 'Guardar cambios' : 'Publicar propiedad';
  }
}

/* ============================================================
   LISTADO / EDITAR / BORRAR
   ============================================================ */
function cargarPropiedades() {
  db.collection('propiedades').orderBy('creadoEn', 'desc').onSnapshot(snapshot => {
    const cont = document.getElementById('lista-propiedades');
    const vacio = document.getElementById('lista-vacia');
    cont.innerHTML = '';
    document.getElementById('contador').textContent = snapshot.size;

    if (snapshot.empty) {
      vacio.style.display = 'block';
      return;
    }
    vacio.style.display = 'none';

    snapshot.forEach(doc => {
      const p = doc.data();
      const foto = (p.fotos && p.fotos[0]) || '';
      const div = document.createElement('div');
      div.className = 'prop-item';
      div.innerHTML = `
        ${foto ? `<img src="${foto}" alt="${p.titulo}">` : `<div style="width:90px;height:70px;background:#111;border-radius:4px;flex-shrink:0;"></div>`}
        <div class="info">
          <h4>${p.titulo}</h4>
          <p>${p.zona} · ${p.moneda} ${Number(p.precio).toLocaleString('es-AR')}</p>
          <span class="tag">${p.tipo} · ${p.operacion}</span>
        </div>
        <div class="acciones">
          <button class="btn-icon" title="Editar" onclick="editarPropiedad('${doc.id}')"><i class="fas fa-pen"></i></button>
          <button class="btn-icon" title="Borrar" onclick="borrarPropiedad('${doc.id}')"><i class="fas fa-trash"></i></button>
        </div>
      `;
      cont.appendChild(div);
    });
  });
}

async function editarPropiedad(id) {
  const docSnap = await db.collection('propiedades').doc(id).get();
  if (!docSnap.exists) return;
  const p = docSnap.data();

  document.getElementById('edit-id').value = id;
  document.getElementById('f-tipo').value = p.tipo || 'Departamento';
  document.getElementById('f-operacion').value = p.operacion || 'Venta';
  document.getElementById('f-moneda').value = p.moneda || 'USD';
  document.getElementById('f-titulo').value = p.titulo || '';
  document.getElementById('f-precio').value = p.precio || '';
  document.getElementById('f-zona').value = p.zona || '';
  document.getElementById('f-direccion').value = p.direccion || '';
  document.getElementById('f-ambientes').value = p.ambientes || '';
  document.getElementById('f-dormitorios').value = p.dormitorios || '';
  document.getElementById('f-banos').value = p.banos || '';
  document.getElementById('f-m2cub').value = p.m2Cubiertos || '';
  document.getElementById('f-m2tot').value = p.m2Totales || '';
  document.getElementById('f-antiguedad').value = p.antiguedad || '';
  document.getElementById('f-cochera').checked = !!p.cochera;
  document.getElementById('f-descripcion').value = p.descripcion || '';
  
  // Limpiamos los inputs de archivos (si no suben nada, se conservan las viejas)
  for(let i=0; i<5; i++) {
    const el = document.getElementById(`f-foto-${i}`);
    if(el) el.value = '';
  }

  document.getElementById('form-title').textContent = 'Editando propiedad (Dejá las fotos vacías para no cambiarlas)';
  document.getElementById('btn-guardar').textContent = 'Guardar cambios';
  document.getElementById('btn-cancelar-edicion').style.display = 'block';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function borrarPropiedad(id) {
  if (!confirm('¿Seguro que querés borrar esta propiedad? Esta acción no se puede deshacer.')) return;

  try {
    await db.collection('propiedades').doc(id).delete();
  } catch (err) {
    console.error(err);
    alert('Ocurrió un error al borrar la propiedad.');
  }
}
</script>
</body>
</html>
